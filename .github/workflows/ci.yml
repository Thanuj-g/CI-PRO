name: CI Pipeline

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Get code
        uses: actions/checkout@v3

      - name: Install Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Fix permissions
        run: chmod +x node_modules/.bin/jest

      - name: Run tests
        run: npx jest

      - name: Start app
        run: |
          nohup node server.js &
          sleep 5
          curl http://localhost:3000
